services:
  # CPU version
  app-cpu:
    build:
      context: ./backend
      dockerfile: Dockerfile.cpu
    ports:
      - "9091:9091"
    env_file:
      - ./backend/.env
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434/v1
      - HF_HUB_DISABLE_XET=1
    volumes:
      - ./backend/data:/app/data
      - ./backend/chroma_db:/app/chroma_db
      - hf_cache:/root/.cache/huggingface
    profiles:
      - cpu
      - default

  # GPU version
  app-gpu:
    build:
      context: ./backend
      dockerfile: Dockerfile.gpu
    ports:
      - "9091:9091"
    env_file:
      - ./backend/.env
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434/v1
      - HF_HUB_DISABLE_XET=1
    volumes:
      - ./backend/data:/app/data
      - ./backend/chroma_db:/app/chroma_db
      - hf_cache:/root/.cache/huggingface
    profiles:
      - gpu

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    profiles:
      - cpu
      - default
      - gpu

volumes:
  hf_cache:
