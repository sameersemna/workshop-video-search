services:
  # CPU version
  app-cpu:
    build:
      context: ./backend
      dockerfile: Dockerfile.cpu
    ports:
      - "9091:9091"
    env_file:
      - ./backend/.env
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434/v1
    profiles:
      - cpu
      - default

  # GPU version
  app-gpu:
    build:
      context: ./backend
      dockerfile: Dockerfile.gpu
    ports:
      - "9091:9091"
    env_file:
      - ./backend/.env
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434/v1
    profiles:
      - gpu

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    profiles:
      - cpu
      - default
      - gpu
